<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Ubeeq logo</title>
  <desc id="desc">Wordmark logo for Ubeeq.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1360" height="380" rx="56" fill="url(#bgGrad)"/>

  <g>
    <circle cx="200" cy="210" r="82" fill="none" stroke="#99f6e4" stroke-width="18"/>
    <circle cx="200" cy="210" r="44" fill="none" stroke="#dbeafe" stroke-width="14"/>
    <circle cx="200" cy="210" r="12" fill="#ffffff"/>

    <text x="360" y="266" fill="url(#textGrad)" font-family="Avenir Next, Montserrat, Poppins, Segoe UI, sans-serif" font-size="182" font-weight="700" letter-spacing="1" filter="url(#softShadow)">Ubeeq</text>
  </g>
</svg>
